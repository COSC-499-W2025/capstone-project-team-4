# This is literally the same as `docker-compose.yml`, but for Dokploy/deployment, it won't conflict
# with ports on the server

# Also, under backend:, I removed the .env as that is handled on Dokploy itself.
services:
  db:
    image: postgres:15-alpine
    container_name: project-analyzer-db
    environment:
      - POSTGRES_USER=workmine
      - POSTGRES_PASSWORD=workmine
      - POSTGRES_DB=workmine
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workmine -d workmine"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-analyzer-backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://workmine:workmine@db:5432/workmine
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: project-analyzer-frontend
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
