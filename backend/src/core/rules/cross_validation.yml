# Multi-Signal Boost Rules
# Additional boosts when multiple signals agree
multi_signal_rules:
  # Modern React app
  - name: "Modern React Application"
    conditions:
      languages: ["TypeScript", "JavaScript"]
      frameworks: ["React"]
      libraries: ["react", "react-dom"]
      tools: ["Vite", "Jest"]
    boost: 0.3
    inferred_skill: "Modern Frontend Development"

  # Full-Stack Next.js
  - name: "Full-Stack Next.js"
    conditions:
      languages: ["TypeScript"]
      frameworks: ["Next.js"]
      libraries: ["next", "prisma"]
      tools: ["Vercel"]
    boost: 0.35
    inferred_skill: "Full-Stack Development"

  # Python Data Science Stack
  - name: "Data Science Stack"
    conditions:
      languages: ["Python"]
      libraries: ["pandas", "numpy", "matplotlib"]
    boost: 0.25
    inferred_skill: "Data Science"

  # Python ML Stack
  - name: "Machine Learning Stack"
    conditions:
      languages: ["Python"]
      frameworks: ["TensorFlow", "PyTorch"]
      libraries: ["tensorflow", "torch", "keras"]
    boost: 0.3
    inferred_skill: "Machine Learning Engineering"

  # DevOps Stack
  - name: "DevOps Stack"
    conditions:
      tools: ["Docker", "GitHub Actions", "Kubernetes"]
    boost: 0.35
    inferred_skill: "DevOps & Infrastructure"

  # Enterprise Java
  - name: "Enterprise Java Stack"
    conditions:
      languages: ["Java"]
      frameworks: ["Spring Boot"]
      tools: ["Maven", "JUnit"]
    boost: 0.25
    inferred_skill: "Enterprise Java Development"

# Gap-Filling Rules
# When to create gap-filled framework entries
gap_fill_rules:
  # If library found but framework not detected
  library_implies_framework:
    enabled: true
    min_confidence: 0.6

  # If tool config found but framework not detected
  tool_implies_framework:
    enabled: true
    min_confidence: 0.55

  # Require language match for gap fill
  require_language_match: false
