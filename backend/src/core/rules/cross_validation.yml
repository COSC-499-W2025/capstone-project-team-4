# Cross-Validation Rules for Complementary Detection System
# Version 1.0.0
#
# This file defines rules for cross-validating detections between
# languages, frameworks, libraries, and tools.

rules_version: "1.0.0"

settings:
  # Boost amount when multiple signals agree
  multi_signal_boost: 0.15

  # Minimum confidence for gap-filled frameworks
  gap_fill_base_confidence: 0.6

  # Penalty when framework detected but no supporting library/tool
  no_support_penalty: 0.1

  # Minimum required sources for high confidence
  high_confidence_sources: 3

# Library to Framework Mappings
# Maps library names to expected frameworks
library_framework_mappings:
  # React ecosystem
  react:
    framework: "React"
    confidence_boost: 0.2
  react-dom:
    framework: "React"
    confidence_boost: 0.15
  react-router:
    framework: "React"
    confidence_boost: 0.1
  react-router-dom:
    framework: "React"
    confidence_boost: 0.1

  # Next.js
  next:
    framework: "Next.js"
    confidence_boost: 0.25
  "@next/font":
    framework: "Next.js"
    confidence_boost: 0.1

  # Vue ecosystem
  vue:
    framework: "Vue"
    confidence_boost: 0.2
  vue-router:
    framework: "Vue"
    confidence_boost: 0.1
  pinia:
    framework: "Vue"
    confidence_boost: 0.1

  # Nuxt.js
  nuxt:
    framework: "Nuxt.js"
    confidence_boost: 0.25

  # Angular
  "@angular/core":
    framework: "Angular"
    confidence_boost: 0.25
  "@angular/common":
    framework: "Angular"
    confidence_boost: 0.1

  # Svelte
  svelte:
    framework: "Svelte"
    confidence_boost: 0.2
  "@sveltejs/kit":
    framework: "SvelteKit"
    confidence_boost: 0.25

  # Python frameworks
  django:
    framework: "Django"
    confidence_boost: 0.25
  flask:
    framework: "Flask"
    confidence_boost: 0.25
  fastapi:
    framework: "FastAPI"
    confidence_boost: 0.25
  starlette:
    framework: "FastAPI"
    confidence_boost: 0.15

  # Node.js frameworks
  express:
    framework: "Express"
    confidence_boost: 0.25
  fastify:
    framework: "Fastify"
    confidence_boost: 0.25
  "@nestjs/core":
    framework: "NestJS"
    confidence_boost: 0.25

  # ML/AI
  tensorflow:
    framework: "TensorFlow"
    confidence_boost: 0.25
  torch:
    framework: "PyTorch"
    confidence_boost: 0.25
  keras:
    framework: "Keras"
    confidence_boost: 0.25
  scikit-learn:
    framework: "Scikit-learn"
    confidence_boost: 0.25

  # Testing
  jest:
    framework: "Jest"
    confidence_boost: 0.2
  vitest:
    framework: "Vitest"
    confidence_boost: 0.2
  pytest:
    framework: "Pytest"
    confidence_boost: 0.2
  cypress:
    framework: "Cypress"
    confidence_boost: 0.2
  playwright:
    framework: "Playwright"
    confidence_boost: 0.2

# Tool to Framework Mappings
