# Composite skill rules - inferred from combinations
composite_rules:
  libraries:
    - skill: "Data Science"
      requires: ["pandas", "numpy", "scipy", "matplotlib", "seaborn"]
      min_count: 3
    - skill: "Machine Learning Engineering"
      requires: ["tensorflow", "pytorch", "torch", "keras", "scikit-learn", "sklearn", "transformers"]
      min_count: 2
    - skill: "Web Scraping & Data Extraction"
      requires: ["beautifulsoup4", "scrapy", "selenium", "puppeteer", "cheerio"]
      min_count: 2
    - skill: "API Integration"
      requires: ["axios", "requests", "httpx", "aiohttp", "got"]
      min_count: 1
    - skill: "Authentication & Security"
      requires: ["passport", "jsonwebtoken", "bcrypt", "argon2", "pyjwt"]
      min_count: 2
    - skill: "Database Integration"
      requires: ["pg", "mysql2", "mongodb", "pymongo", "psycopg2", "asyncpg", "redis"]
      min_count: 1
    - skill: "Cloud Services Integration"
      requires: ["boto3", "aws-sdk", "google-cloud", "@google-cloud", "azure"]
      min_count: 1

  tools:
    - skill: "DevOps & Infrastructure"
      requires: ["Docker", "Kubernetes", "GitHub Actions", "GitLab CI", "Jenkins", "Terraform", "Ansible"]
      min_count: 3
    - skill: "Comprehensive Testing Strategy"
      requires: ["Jest", "Pytest", "Cypress", "Playwright", "Vitest", "JUnit"]
      min_count: 2
    - skill: "Code Quality Automation"
      requires: ["ESLint", "Prettier", "Black", "Ruff", "Mypy", "TypeScript"]
      min_count: 2
    - skill: "Modern Build Systems"
      requires: ["Vite", "Webpack", "esbuild", "Turbopack", "Rollup"]
      min_count: 1
    - skill: "Technical Documentation"
      requires: ["Storybook", "Swagger", "Sphinx", "JSDoc", "TypeDoc"]
      min_count: 1
    - skill: "Monorepo Architecture"
      requires: ["Lerna", "Nx", "Turborepo", "Rush"]
      min_count: 1

  frameworks:
    - skill: "Machine Learning Engineering"
      requires: ["TensorFlow", "PyTorch", "Keras", "Scikit-learn"]
      min_count: 2
    - skill: "Test Automation"
      requires: ["Jest", "Pytest", "Cypress", "Playwright", "JUnit", "Vitest", "Mocha", "RSpec"]
      min_count: 2

# Tool category to skill mapping
tool_category_skills:
  cicd: "CI/CD Pipeline Configuration"
  container: "Containerization"
  infrastructure: "Infrastructure as Code"
  testing: "Test Automation"
  linting: "Code Quality & Standards"

# File-based threshold rules
file_threshold_rules:
  - skills: ["Photography", "RAW Photo Processing"]
    extensions: [".raw", ".cr2", ".nef", ".arw"]
    min_count: 3
  - skills: ["Photography"]
    extensions: [".jpg", ".jpeg"]
    min_count: 10
  - skills: ["Video Editing", "Multimedia Production"]
    extensions: [".mp4", ".avi", ".mov", ".wmv"]
    min_count: 2
  - skills: ["Audio Editing", "Music Production"]
    extensions: [".wav", ".flac", ".aac"]
    min_count: 3
  - skills: ["3D Modeling"]
    extensions: [".blend", ".obj", ".fbx", ".stl"]
    min_count: 1
  - skills: ["Documentation", "Technical Writing"]
    extensions: [".md"]
    min_count: 5

# Extensions that trigger skills with just 1 file
single_file_triggers:
  - ".psd"
  - ".ai"
  - ".sketch"
  - ".fig"
  - ".tex"
  - ".ipynb"
