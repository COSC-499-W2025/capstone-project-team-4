<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Project - {{ project }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 24px; }
    h1 { margin-bottom: 8px; }
    section { border: 1px solid #ddd; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    select { min-width: 200px; }
    pre { background: #f8f8f8; padding: 8px; border-radius: 6px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Project: {{ project }}</h1>
  <p><a href="/">← Back</a></p>

  <section>
    <form method="get" action="/project/{{ project }}">
      <label>Timestamp:
        <select name="ts" onchange="this.form.submit()">
          <option value="">(select)</option>
          {% for t in timestamps %}
            <option value="{{ t }}" {% if t == selected_ts %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </label>
    </form>
  </section>

  {% if selected_ts %}
  <section>
    <h2>Files in {{ selected_ts }}</h2>
    {% if files %}
      <ul>
        {% for f in files %}
          <li><a href="/project/{{ project }}/{{ selected_ts }}/{{ f }}" target="_blank">{{ f }}</a></li>
        {% endfor %}
      </ul>
    {% else %}
      <p>No JSON files found.</p>
    {% endif %}
  </section>

  <section>
    <h2>Delete this run</h2>
    <form method="post" action="/delete">
      <input type="hidden" name="project" value="{{ project }}" />
      <input type="hidden" name="ts" value="{{ selected_ts }}" />
      <button onclick="return confirm('Delete this run?')">Delete</button>
    </form>
  </section>
  {% endif %}
</body>
</html>
