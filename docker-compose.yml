services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: workmine-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workmine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workmine}
      POSTGRES_DB: ${POSTGRES_DB:-workmine}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workmine} -d ${POSTGRES_DB:-workmine}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workmine-backend
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-workmine}:${POSTGRES_PASSWORD:-workmine}@db:5432/${POSTGRES_DB:-workmine}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AI_RESUME_GENERATION=${AI_RESUME_GENERATION:-True}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: workmine-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_data:
